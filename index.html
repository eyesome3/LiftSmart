<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0b0f" />
    <title>LiftSmart</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0b0f'/%3E%3Cpath d='M7 16h3M22 16h3M12 12h8v8h-8z' stroke='%2322d3ee' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              ink: {
                950: '#07070a',
                900: '#0b0b0f',
                800: '#111118',
                700: '#1a1a24',
                600: '#242433',
                500: '#3a3a4d',
                400: '#6b6b83',
                300: '#9a9ab0',
                200: '#c9c9d6',
                100: '#ececf1',
              },
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        background: radial-gradient(120% 80% at 50% -10%, #16162a 0%, #07070a 55%, #050509 100%)
          no-repeat fixed;
        color: #ececf1;
      }
      /* hide number input spinners */
      input[type='number']::-webkit-inner-spin-button,
      input[type='number']::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type='number'] {
        -moz-appearance: textfield;
      }
      /* thin scrollbar inside cards */
      .scroll-thin::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      .scroll-thin::-webkit-scrollbar-thumb {
        background: #3a3a4d;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      /* ------------------------------------------------------------------ */
      /* Storage helpers                                                     */
      /* ------------------------------------------------------------------ */
      const KEYS = {
        profile: 'liftsmart.profile.v1',
        workouts: 'liftsmart.workouts.v1',
        apiKey: 'liftsmart.apiKey.v1',
        settings: 'liftsmart.settings.v1',
      };

      function readLS(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          if (raw == null) return fallback;
          return JSON.parse(raw);
        } catch (e) {
          console.warn('readLS failed', key, e);
          return fallback;
        }
      }
      function writeLS(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          console.warn('writeLS failed', key, e);
        }
      }

      /* ------------------------------------------------------------------ */
      /* Unit conversions                                                    */
      /* ------------------------------------------------------------------ */
      const KG_PER_LB = 0.45359237;
      const CM_PER_IN = 2.54;
      const lbToKg = (lb) => lb * KG_PER_LB;
      const kgToLb = (kg) => kg / KG_PER_LB;
      const cmToFtIn = (cm) => {
        const totalIn = cm / CM_PER_IN;
        const ft = Math.floor(totalIn / 12);
        const inch = Math.round(totalIn - ft * 12);
        if (inch === 12) return { ft: ft + 1, in: 0 };
        return { ft, in: inch };
      };
      const ftInToCm = (ft, inch) => (Number(ft) * 12 + Number(inch)) * CM_PER_IN;

      /* ------------------------------------------------------------------ */
      /* Data defaults                                                       */
      /* ------------------------------------------------------------------ */
      const EXERCISE_PRESETS = [
        'Bench Press',
        'Back Squat',
        'Deadlift',
        'Overhead Press',
        'Barbell Row',
        'Front Squat',
        'Romanian Deadlift',
        'Incline Bench Press',
        'Pull-Up',
        'Chin-Up',
        'Dumbbell Curl',
        'Tricep Pushdown',
        'Lat Pulldown',
        'Seated Cable Row',
        'Leg Press',
        'Hip Thrust',
        'Bulgarian Split Squat',
        'Lateral Raise',
        'Face Pull',
      ];

      const BLANK_PROFILE = {
        bodyWeight: '',
        bodyWeightUnit: 'lbs',
        heightCm: '',
        heightUnit: 'ft-in',
        age: '',
        sex: '',
        experience: '',
        goal: '',
      };

      /* ------------------------------------------------------------------ */
      /* Small UI primitives                                                  */
      /* ------------------------------------------------------------------ */
      function cx(...parts) {
        return parts.filter(Boolean).join(' ');
      }

      function SegmentedControl({ options, value, onChange, label, size = 'md' }) {
        const pad = size === 'sm' ? 'px-3 py-1.5 text-xs' : 'px-3.5 py-2 text-sm';
        return (
          <div>
            {label && (
              <div className="mb-1.5 text-xs font-medium uppercase tracking-wider text-ink-300">
                {label}
              </div>
            )}
            <div className="inline-flex rounded-xl bg-ink-800 p-1 ring-1 ring-ink-700">
              {options.map((opt) => {
                const active = value === opt.value;
                return (
                  <button
                    key={opt.value}
                    type="button"
                    onClick={() => onChange(opt.value)}
                    className={cx(
                      'rounded-lg font-medium transition',
                      pad,
                      active
                        ? 'bg-ink-600 text-ink-100 shadow'
                        : 'text-ink-300 hover:text-ink-100',
                    )}
                  >
                    {opt.label}
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      function Field({ label, hint, children, className }) {
        return (
          <label className={cx('block', className)}>
            <div className="mb-1.5 text-xs font-medium uppercase tracking-wider text-ink-300">
              {label}
            </div>
            {children}
            {hint && <div className="mt-1 text-xs text-ink-400">{hint}</div>}
          </label>
        );
      }

      function TextInput({ value, onChange, type = 'text', inputMode, placeholder, className, ...rest }) {
        return (
          <input
            type={type}
            inputMode={inputMode}
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            className={cx(
              'w-full rounded-xl bg-ink-800 px-3.5 py-2.5 text-base text-ink-100 ring-1 ring-ink-700 placeholder-ink-400',
              'focus:outline-none focus:ring-2 focus:ring-cyan-400/70',
              className,
            )}
            {...rest}
          />
        );
      }

      function Select({ value, onChange, options, placeholder = 'Select\u2026', className }) {
        return (
          <div className={cx('relative', className)}>
            <select
              value={value}
              onChange={(e) => onChange(e.target.value)}
              className={cx(
                'w-full appearance-none rounded-xl bg-ink-800 px-3.5 py-2.5 pr-9 text-base text-ink-100 ring-1 ring-ink-700',
                'focus:outline-none focus:ring-2 focus:ring-cyan-400/70',
                !value && 'text-ink-400',
              )}
            >
              <option value="" disabled>
                {placeholder}
              </option>
              {options.map((o) => (
                <option key={o.value} value={o.value} className="bg-ink-800 text-ink-100">
                  {o.label}
                </option>
              ))}
            </select>
            <svg
              viewBox="0 0 20 20"
              aria-hidden="true"
              className="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-ink-300"
              fill="currentColor"
            >
              <path d="M5.5 7.5l4.5 4.5 4.5-4.5" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>
        );
      }

      function Button({ children, variant = 'primary', className, full, size = 'md', ...rest }) {
        const base = 'inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50';
        const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2.5 text-sm', lg: 'px-5 py-3 text-base' };
        const variants = {
          primary:
            'bg-gradient-to-b from-cyan-400 to-cyan-500 text-ink-950 shadow-lg shadow-cyan-500/20 hover:from-cyan-300 hover:to-cyan-400',
          secondary: 'bg-ink-700 text-ink-100 ring-1 ring-ink-600 hover:bg-ink-600',
          ghost: 'text-ink-200 hover:bg-ink-800',
          danger: 'bg-red-500/20 text-red-300 ring-1 ring-red-500/40 hover:bg-red-500/30',
        };
        return (
          <button
            className={cx(base, sizes[size], variants[variant], full && 'w-full', className)}
            {...rest}
          >
            {children}
          </button>
        );
      }

      function Card({ children, className }) {
        return (
          <div
            className={cx(
              'rounded-2xl bg-ink-800/70 ring-1 ring-ink-700 backdrop-blur-sm',
              'shadow-[0_1px_0_0_rgba(255,255,255,0.04)_inset]',
              className,
            )}
          >
            {children}
          </div>
        );
      }

      function SectionHeader({ title, subtitle, right }) {
        return (
          <div className="mb-3 flex items-end justify-between gap-3">
            <div>
              <h2 className="text-lg font-semibold tracking-tight text-ink-100">{title}</h2>
              {subtitle && <p className="text-sm text-ink-300">{subtitle}</p>}
            </div>
            {right}
          </div>
        );
      }

      function Badge({ children, tone = 'neutral' }) {
        const tones = {
          neutral: 'bg-ink-700 text-ink-200 ring-ink-600',
          cyan: 'bg-cyan-500/15 text-cyan-300 ring-cyan-400/30',
          amber: 'bg-amber-500/15 text-amber-300 ring-amber-400/30',
          violet: 'bg-violet-500/15 text-violet-300 ring-violet-400/30',
          green: 'bg-emerald-500/15 text-emerald-300 ring-emerald-400/30',
        };
        return (
          <span className={cx('inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium ring-1', tones[tone])}>
            {children}
          </span>
        );
      }

      /* ------------------------------------------------------------------ */
      /* Profile Setup                                                        */
      /* ------------------------------------------------------------------ */
      function ProfileForm({ initial, onSave, onCancel, submitLabel = 'Save profile' }) {
        const [p, setP] = useState(() => ({ ...BLANK_PROFILE, ...(initial || {}) }));
        const [heightFt, setHeightFt] = useState(() => {
          if (initial && initial.heightCm) return cmToFtIn(initial.heightCm).ft;
          return '';
        });
        const [heightIn, setHeightIn] = useState(() => {
          if (initial && initial.heightCm) return cmToFtIn(initial.heightCm).in;
          return '';
        });

        // keep ft/in fields in sync when user switches to cm and back
        useEffect(() => {
          if (p.heightUnit === 'ft-in' && p.heightCm) {
            const { ft, in: inch } = cmToFtIn(Number(p.heightCm));
            setHeightFt(ft);
            setHeightIn(inch);
          }
        }, [p.heightUnit]);

        const set = (k) => (v) => setP((cur) => ({ ...cur, [k]: v }));

        const canSave =
          p.bodyWeight &&
          Number(p.bodyWeight) > 0 &&
          p.heightCm &&
          Number(p.heightCm) > 0 &&
          p.age &&
          Number(p.age) > 0 &&
          p.sex &&
          p.experience &&
          p.goal;

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!canSave) return;
          const now = new Date().toISOString();
          onSave({
            ...p,
            bodyWeight: Number(p.bodyWeight),
            heightCm: Number(p.heightCm),
            age: Number(p.age),
            createdAt: (initial && initial.createdAt) || now,
            updatedAt: now,
          });
        };

        return (
          <form onSubmit={handleSubmit} className="space-y-5">
            {/* Body weight */}
            <div className="flex flex-col gap-3 sm:flex-row sm:items-end">
              <Field label="Body weight" className="flex-1">
                <TextInput
                  type="number"
                  inputMode="decimal"
                  min="0"
                  step="0.1"
                  value={p.bodyWeight}
                  onChange={(v) => set('bodyWeight')(v)}
                  placeholder={p.bodyWeightUnit === 'kg' ? '80' : '175'}
                />
              </Field>
              <SegmentedControl
                value={p.bodyWeightUnit}
                onChange={(u) => {
                  if (u === p.bodyWeightUnit) return;
                  // convert value when unit changes
                  const n = Number(p.bodyWeight);
                  if (n > 0) {
                    const converted =
                      u === 'kg' ? lbToKg(n).toFixed(1) : kgToLb(n).toFixed(1);
                    setP((cur) => ({ ...cur, bodyWeightUnit: u, bodyWeight: converted }));
                  } else {
                    set('bodyWeightUnit')(u);
                  }
                }}
                options={[
                  { label: 'lbs', value: 'lbs' },
                  { label: 'kg', value: 'kg' },
                ]}
              />
            </div>

            {/* Height */}
            <div className="flex flex-col gap-3 sm:flex-row sm:items-end">
              {p.heightUnit === 'cm' ? (
                <Field label="Height" className="flex-1">
                  <TextInput
                    type="number"
                    inputMode="numeric"
                    min="0"
                    step="1"
                    value={p.heightCm}
                    onChange={(v) => set('heightCm')(v)}
                    placeholder="178"
                  />
                </Field>
              ) : (
                <div className="flex flex-1 gap-3">
                  <Field label="Height (ft)" className="flex-1">
                    <TextInput
                      type="number"
                      inputMode="numeric"
                      min="0"
                      step="1"
                      value={heightFt}
                      onChange={(v) => {
                        setHeightFt(v);
                        const cm = ftInToCm(v || 0, heightIn || 0);
                        set('heightCm')(cm ? cm.toFixed(1) : '');
                      }}
                      placeholder="5"
                    />
                  </Field>
                  <Field label="in" className="flex-1">
                    <TextInput
                      type="number"
                      inputMode="numeric"
                      min="0"
                      max="11"
                      step="1"
                      value={heightIn}
                      onChange={(v) => {
                        setHeightIn(v);
                        const cm = ftInToCm(heightFt || 0, v || 0);
                        set('heightCm')(cm ? cm.toFixed(1) : '');
                      }}
                      placeholder="10"
                    />
                  </Field>
                </div>
              )}
              <SegmentedControl
                value={p.heightUnit}
                onChange={(u) => set('heightUnit')(u)}
                options={[
                  { label: 'ft-in', value: 'ft-in' },
                  { label: 'cm', value: 'cm' },
                ]}
              />
            </div>

            <div className="grid grid-cols-2 gap-3">
              <Field label="Age">
                <TextInput
                  type="number"
                  inputMode="numeric"
                  min="10"
                  max="120"
                  step="1"
                  value={p.age}
                  onChange={(v) => set('age')(v)}
                  placeholder="28"
                />
              </Field>
              <Field label="Sex">
                <Select
                  value={p.sex}
                  onChange={(v) => set('sex')(v)}
                  options={[
                    { value: 'male', label: 'Male' },
                    { value: 'female', label: 'Female' },
                    { value: 'other', label: 'Other' },
                  ]}
                />
              </Field>
            </div>

            <Field label="Training experience">
              <div className="grid grid-cols-3 gap-2">
                {[
                  { value: 'beginner', label: 'Beginner', hint: '< 1 yr' },
                  { value: 'intermediate', label: 'Intermediate', hint: '1–3 yrs' },
                  { value: 'advanced', label: 'Advanced', hint: '3+ yrs' },
                ].map((opt) => {
                  const active = p.experience === opt.value;
                  return (
                    <button
                      key={opt.value}
                      type="button"
                      onClick={() => set('experience')(opt.value)}
                      className={cx(
                        'rounded-xl px-3 py-2.5 text-left ring-1 transition',
                        active
                          ? 'bg-cyan-500/15 text-cyan-200 ring-cyan-400/40'
                          : 'bg-ink-800 text-ink-200 ring-ink-700 hover:bg-ink-700',
                      )}
                    >
                      <div className="text-sm font-semibold">{opt.label}</div>
                      <div className="text-[11px] text-ink-400">{opt.hint}</div>
                    </button>
                  );
                })}
              </div>
            </Field>

            <Field label="Current goal">
              <div className="grid grid-cols-3 gap-2">
                {[
                  { value: 'bulking', label: 'Bulking', emoji: '📈' },
                  { value: 'maintaining', label: 'Maintain', emoji: '⚖️' },
                  { value: 'cutting', label: 'Cutting', emoji: '🔥' },
                ].map((opt) => {
                  const active = p.goal === opt.value;
                  return (
                    <button
                      key={opt.value}
                      type="button"
                      onClick={() => set('goal')(opt.value)}
                      className={cx(
                        'rounded-xl px-3 py-2.5 text-center ring-1 transition',
                        active
                          ? 'bg-cyan-500/15 text-cyan-200 ring-cyan-400/40'
                          : 'bg-ink-800 text-ink-200 ring-ink-700 hover:bg-ink-700',
                      )}
                    >
                      <div className="text-base">{opt.emoji}</div>
                      <div className="text-sm font-semibold">{opt.label}</div>
                    </button>
                  );
                })}
              </div>
            </Field>

            <div className="flex gap-2 pt-2">
              {onCancel && (
                <Button type="button" variant="secondary" onClick={onCancel}>
                  Cancel
                </Button>
              )}
              <Button type="submit" disabled={!canSave} full>
                {submitLabel}
              </Button>
            </div>
          </form>
        );
      }

      function ProfileSetupScreen({ onSaved }) {
        return (
          <div className="mx-auto max-w-xl px-4 pb-24 pt-10 sm:pt-16">
            <div className="mb-7 text-center">
              <div className="mx-auto mb-3 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-cyan-500/15 ring-1 ring-cyan-400/30">
                <LogoMark className="h-6 w-6 text-cyan-300" />
              </div>
              <h1 className="text-2xl font-bold tracking-tight">Welcome to LiftSmart</h1>
              <p className="mt-1 text-sm text-ink-300">
                Tell us about yourself so we can tune your overload plan.
              </p>
            </div>
            <Card className="p-5 sm:p-6">
              <ProfileForm onSave={onSaved} submitLabel="Continue" />
            </Card>
            <p className="mt-4 text-center text-xs text-ink-400">
              Data stays on this device — nothing is uploaded.
            </p>
          </div>
        );
      }

      /* ------------------------------------------------------------------ */
      /* Logging a workout                                                    */
      /* ------------------------------------------------------------------ */
      function newSet() {
        return { id: crypto.randomUUID(), reps: '' };
      }
      function newExercise(name = '') {
        return {
          id: crypto.randomUUID(),
          name,
          weight: '',
          unit: 'lbs',
          sets: [newSet(), newSet(), newSet()],
        };
      }

      function ExerciseEditor({ exercise, onChange, onRemove, defaultUnit }) {
        const set = (patch) => onChange({ ...exercise, ...patch });
        const updateSet = (sid, patch) =>
          set({
            sets: exercise.sets.map((s) => (s.id === sid ? { ...s, ...patch } : s)),
          });
        const addSet = () => set({ sets: [...exercise.sets, newSet()] });
        const removeSet = (sid) =>
          set({ sets: exercise.sets.filter((s) => s.id !== sid) });

        return (
          <Card className="p-4">
            <div className="flex items-start gap-2">
              <div className="flex-1">
                <Field label="Exercise">
                  <input
                    list="exercise-presets"
                    value={exercise.name}
                    onChange={(e) => set({ name: e.target.value })}
                    placeholder="e.g. Bench Press"
                    className="w-full rounded-xl bg-ink-900 px-3.5 py-2.5 text-base text-ink-100 ring-1 ring-ink-700 placeholder-ink-400 focus:outline-none focus:ring-2 focus:ring-cyan-400/70"
                  />
                </Field>
              </div>
              <button
                type="button"
                onClick={onRemove}
                className="mt-6 shrink-0 rounded-lg px-2 py-1 text-ink-400 hover:bg-ink-700 hover:text-red-300"
                aria-label="Remove exercise"
                title="Remove exercise"
              >
                <svg viewBox="0 0 20 20" className="h-5 w-5" fill="currentColor" aria-hidden>
                  <path d="M6 7v8a2 2 0 002 2h4a2 2 0 002-2V7H6zm2-3a1 1 0 011-1h2a1 1 0 011 1v1h3a1 1 0 110 2H5a1 1 0 110-2h3V4z" />
                </svg>
              </button>
            </div>

            <div className="mt-3 flex gap-3">
              <Field label="Working weight" className="flex-1">
                <TextInput
                  type="number"
                  inputMode="decimal"
                  min="0"
                  step="2.5"
                  value={exercise.weight}
                  onChange={(v) => set({ weight: v })}
                  placeholder={exercise.unit === 'kg' ? '60' : '135'}
                />
              </Field>
              <div className="pb-[2px]">
                <SegmentedControl
                  label="Unit"
                  size="sm"
                  value={exercise.unit}
                  onChange={(u) => set({ unit: u })}
                  options={[
                    { value: 'lbs', label: 'lbs' },
                    { value: 'kg', label: 'kg' },
                  ]}
                />
              </div>
            </div>

            <div className="mt-4">
              <div className="mb-2 flex items-center justify-between">
                <div className="text-xs font-medium uppercase tracking-wider text-ink-300">
                  Sets
                </div>
                <button
                  type="button"
                  onClick={addSet}
                  className="text-xs font-semibold text-cyan-300 hover:text-cyan-200"
                >
                  + Add set
                </button>
              </div>
              <div className="space-y-2">
                {exercise.sets.map((s, idx) => (
                  <div key={s.id} className="flex items-center gap-2">
                    <div className="w-8 shrink-0 text-center text-sm font-mono text-ink-400">
                      #{idx + 1}
                    </div>
                    <input
                      type="number"
                      inputMode="numeric"
                      min="0"
                      step="1"
                      value={s.reps}
                      onChange={(e) =>
                        updateSet(s.id, { reps: e.target.value })
                      }
                      placeholder="reps"
                      className="flex-1 rounded-lg bg-ink-900 px-3 py-2 text-base text-ink-100 ring-1 ring-ink-700 placeholder-ink-400 focus:outline-none focus:ring-2 focus:ring-cyan-400/70"
                    />
                    <button
                      type="button"
                      onClick={() => removeSet(s.id)}
                      disabled={exercise.sets.length <= 1}
                      className="rounded-lg px-2 py-1 text-ink-400 hover:bg-ink-700 hover:text-red-300 disabled:opacity-30"
                      aria-label="Remove set"
                    >
                      <svg viewBox="0 0 20 20" className="h-4 w-4" fill="currentColor" aria-hidden>
                        <path d="M5 10a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1z" />
                      </svg>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          </Card>
        );
      }

      function LogWorkoutScreen({ onSave, onCancel, defaultUnit = 'lbs' }) {
        const [date, setDate] = useState(() => new Date().toISOString().slice(0, 10));
        const [notes, setNotes] = useState('');
        const [exercises, setExercises] = useState(() => [newExercise()]);

        // keep default unit in sync for freshly added exercises
        const addExercise = (name = '') =>
          setExercises((ex) => [...ex, { ...newExercise(name), unit: defaultUnit }]);
        const updateExercise = (id, next) =>
          setExercises((ex) => ex.map((e) => (e.id === id ? next : e)));
        const removeExercise = (id) =>
          setExercises((ex) => ex.filter((e) => e.id !== id));

        const valid = exercises.length > 0 && exercises.every(
          (e) =>
            e.name.trim() &&
            Number(e.weight) > 0 &&
            e.sets.length > 0 &&
            e.sets.every((s) => Number(s.reps) > 0),
        );

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!valid) return;
          const workout = {
            id: crypto.randomUUID(),
            date, // yyyy-mm-dd
            createdAt: new Date().toISOString(),
            notes: notes.trim() || undefined,
            exercises: exercises.map((ex) => ({
              id: ex.id,
              name: ex.name.trim(),
              weight: Number(ex.weight),
              unit: ex.unit,
              sets: ex.sets.map((s) => ({ id: s.id, reps: Number(s.reps) })),
            })),
          };
          onSave(workout);
        };

        return (
          <form onSubmit={handleSubmit} className="mx-auto max-w-xl px-4 pb-32 pt-6">
            <datalist id="exercise-presets">
              {EXERCISE_PRESETS.map((e) => (
                <option key={e} value={e} />
              ))}
            </datalist>

            <div className="mb-4 flex items-end justify-between gap-3">
              <div>
                <h1 className="text-xl font-bold tracking-tight">Log workout</h1>
                <p className="text-sm text-ink-300">
                  Record what you actually did — this feeds the overload engine.
                </p>
              </div>
            </div>

            <Card className="mb-4 p-4">
              <div className="grid grid-cols-2 gap-3">
                <Field label="Date">
                  <TextInput
                    type="date"
                    value={date}
                    onChange={setDate}
                  />
                </Field>
                <Field label="Notes (optional)">
                  <TextInput
                    value={notes}
                    onChange={setNotes}
                    placeholder="Felt strong, knee a bit tight…"
                  />
                </Field>
              </div>
            </Card>

            <div className="space-y-3">
              {exercises.map((ex) => (
                <ExerciseEditor
                  key={ex.id}
                  exercise={ex}
                  defaultUnit={defaultUnit}
                  onChange={(next) => updateExercise(ex.id, next)}
                  onRemove={() => removeExercise(ex.id)}
                />
              ))}
            </div>

            <div className="mt-4 flex flex-wrap gap-2">
              <Button type="button" variant="secondary" onClick={() => addExercise()}>
                + Add exercise
              </Button>
              <div className="flex flex-wrap gap-1.5">
                {EXERCISE_PRESETS.slice(0, 5).map((n) => (
                  <button
                    key={n}
                    type="button"
                    onClick={() => addExercise(n)}
                    className="rounded-full bg-ink-800 px-3 py-1 text-xs text-ink-200 ring-1 ring-ink-700 hover:bg-ink-700"
                  >
                    + {n}
                  </button>
                ))}
              </div>
            </div>

            <div className="fixed inset-x-0 bottom-[72px] z-10 border-t border-ink-700 bg-ink-900/90 px-4 py-3 backdrop-blur sm:relative sm:inset-auto sm:mt-6 sm:border-0 sm:bg-transparent sm:p-0 sm:backdrop-blur-0">
              <div className="mx-auto flex max-w-xl gap-2">
                <Button type="button" variant="secondary" onClick={onCancel}>
                  Cancel
                </Button>
                <Button type="submit" disabled={!valid} full>
                  Save workout
                </Button>
              </div>
            </div>
          </form>
        );
      }

      /* ------------------------------------------------------------------ */
      /* History screen                                                       */
      /* ------------------------------------------------------------------ */
      function HistoryScreen({ workouts, onDelete, onGoLog }) {
        const sorted = useMemo(
          () => [...workouts].sort((a, b) => (a.date < b.date ? 1 : -1)),
          [workouts],
        );

        if (sorted.length === 0) {
          return (
            <div className="mx-auto max-w-xl px-4 pb-24 pt-10">
              <EmptyState
                title="No workouts yet"
                message="Log your first session to start your history."
                action={<Button onClick={onGoLog}>Log workout</Button>}
              />
            </div>
          );
        }

        return (
          <div className="mx-auto max-w-xl px-4 pb-24 pt-6">
            <SectionHeader
              title="History"
              subtitle={`${sorted.length} workout${sorted.length === 1 ? '' : 's'} logged`}
            />
            <div className="space-y-3">
              {sorted.map((w) => (
                <WorkoutCard key={w.id} workout={w} onDelete={() => onDelete(w.id)} />
              ))}
            </div>
          </div>
        );
      }

      function formatDate(iso) {
        try {
          const d = new Date(iso + 'T00:00:00');
          return d.toLocaleDateString(undefined, {
            weekday: 'short',
            month: 'short',
            day: 'numeric',
            year: 'numeric',
          });
        } catch (e) {
          return iso;
        }
      }

      function WorkoutCard({ workout, onDelete }) {
        const [open, setOpen] = useState(false);
        const totalSets = workout.exercises.reduce((n, e) => n + e.sets.length, 0);
        return (
          <Card className="overflow-hidden">
            <button
              type="button"
              onClick={() => setOpen((x) => !x)}
              className="flex w-full items-center justify-between gap-3 px-4 py-3 text-left hover:bg-ink-700/40"
            >
              <div>
                <div className="text-sm font-semibold text-ink-100">
                  {formatDate(workout.date)}
                </div>
                <div className="text-xs text-ink-300">
                  {workout.exercises.length} exercise
                  {workout.exercises.length === 1 ? '' : 's'} · {totalSets} sets
                </div>
              </div>
              <div className="flex items-center gap-2">
                {workout.exercises.slice(0, 2).map((e) => (
                  <Badge key={e.id} tone="neutral">
                    {e.name}
                  </Badge>
                ))}
                {workout.exercises.length > 2 && (
                  <Badge tone="neutral">+{workout.exercises.length - 2}</Badge>
                )}
                <svg
                  viewBox="0 0 20 20"
                  className={cx('h-4 w-4 text-ink-400 transition', open && 'rotate-180')}
                  fill="currentColor"
                  aria-hidden
                >
                  <path d="M5.5 7.5l4.5 4.5 4.5-4.5" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
              </div>
            </button>
            {open && (
              <div className="border-t border-ink-700 bg-ink-800/40 p-4">
                <div className="space-y-3">
                  {workout.exercises.map((ex) => (
                    <div key={ex.id}>
                      <div className="mb-1 flex items-center justify-between">
                        <div className="font-semibold text-ink-100">{ex.name}</div>
                        <div className="text-sm text-ink-300">
                          {ex.weight} {ex.unit}
                        </div>
                      </div>
                      <div className="flex flex-wrap gap-1.5">
                        {ex.sets.map((s, i) => (
                          <span
                            key={s.id}
                            className="rounded-md bg-ink-900 px-2 py-0.5 text-xs font-mono text-ink-200 ring-1 ring-ink-700"
                          >
                            #{i + 1} · {s.reps}
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                {workout.notes && (
                  <div className="mt-3 rounded-lg bg-ink-900/70 p-3 text-sm text-ink-200 ring-1 ring-ink-700">
                    {workout.notes}
                  </div>
                )}
                <div className="mt-3 flex justify-end">
                  <Button variant="danger" size="sm" onClick={onDelete}>
                    Delete workout
                  </Button>
                </div>
              </div>
            )}
          </Card>
        );
      }

      function EmptyState({ title, message, action }) {
        return (
          <Card className="p-8 text-center">
            <div className="mx-auto mb-3 inline-flex h-10 w-10 items-center justify-center rounded-xl bg-ink-700 text-ink-300">
              <svg viewBox="0 0 20 20" className="h-5 w-5" fill="currentColor" aria-hidden>
                <path d="M4 4h4v4H4V4zm8 0h4v4h-4V4zM4 12h4v4H4v-4zm8 0h4v4h-4v-4z" />
              </svg>
            </div>
            <div className="text-base font-semibold text-ink-100">{title}</div>
            <div className="mt-1 text-sm text-ink-300">{message}</div>
            {action && <div className="mt-4">{action}</div>}
          </Card>
        );
      }

      /* ------------------------------------------------------------------ */
      /* Home screen                                                          */
      /* ------------------------------------------------------------------ */
      function HomeScreen({ profile, workouts, onGoLog, onGoHistory, onGoSettings }) {
        const recent = useMemo(
          () => [...workouts].sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 3),
          [workouts],
        );

        return (
          <div className="mx-auto max-w-xl px-4 pb-24 pt-6">
            <div className="mb-5 flex items-center justify-between">
              <div>
                <div className="text-xs font-medium uppercase tracking-wider text-ink-300">
                  Today
                </div>
                <h1 className="text-xl font-bold tracking-tight">
                  {new Date().toLocaleDateString(undefined, {
                    weekday: 'long',
                    month: 'short',
                    day: 'numeric',
                  })}
                </h1>
              </div>
              <button
                onClick={onGoSettings}
                className="rounded-full bg-ink-800 p-2 text-ink-200 ring-1 ring-ink-700 hover:bg-ink-700"
                aria-label="Settings"
              >
                <svg viewBox="0 0 20 20" className="h-5 w-5" fill="currentColor" aria-hidden>
                  <path d="M10 13a3 3 0 100-6 3 3 0 000 6zm7.3-2a7.3 7.3 0 00-.1-1.2l1.7-1.3-1.7-3-2 .7a7.3 7.3 0 00-2-1.2l-.3-2.1h-3.4L9.2 5a7.3 7.3 0 00-2 1.2l-2-.7-1.7 3L5.2 9.8A7.3 7.3 0 005.1 11c0 .4 0 .8.1 1.2l-1.7 1.3 1.7 3 2-.7a7.3 7.3 0 002 1.2l.3 2.1h3.4l.3-2.1a7.3 7.3 0 002-1.2l2 .7 1.7-3-1.7-1.3c.1-.4.1-.8.1-1.2z" />
                </svg>
              </button>
            </div>

            <Card className="mb-4 p-4">
              <div className="flex items-center gap-3">
                <div className="flex h-12 w-12 items-center justify-center rounded-xl bg-cyan-500/15 ring-1 ring-cyan-400/30">
                  <LogoMark className="h-6 w-6 text-cyan-300" />
                </div>
                <div className="flex-1">
                  <div className="text-sm text-ink-300">Your profile</div>
                  <div className="font-semibold text-ink-100">
                    {profile.bodyWeight} {profile.bodyWeightUnit} · {profile.age} yo ·{' '}
                    {profile.sex}
                  </div>
                </div>
                <Badge tone={goalTone(profile.goal)}>{cap(profile.goal)}</Badge>
                <Badge tone="neutral">{cap(profile.experience)}</Badge>
              </div>
            </Card>

            <Button full size="lg" onClick={onGoLog} className="mb-5">
              Log a workout
            </Button>

            <SectionHeader
              title="Recent workouts"
              right={
                workouts.length > 0 && (
                  <button
                    onClick={onGoHistory}
                    className="text-sm font-semibold text-cyan-300 hover:text-cyan-200"
                  >
                    View all
                  </button>
                )
              }
            />
            {recent.length === 0 ? (
              <EmptyState
                title="Nothing logged yet"
                message="Your session history shows up here once you log a workout."
              />
            ) : (
              <div className="space-y-3">
                {recent.map((w) => (
                  <WorkoutCard key={w.id} workout={w} onDelete={() => {}} />
                ))}
              </div>
            )}

            <Card className="mt-6 p-4">
              <div className="flex items-start gap-3">
                <div className="mt-0.5 flex h-8 w-8 items-center justify-center rounded-lg bg-violet-500/15 text-violet-300 ring-1 ring-violet-400/30">
                  <svg viewBox="0 0 20 20" className="h-4 w-4" fill="currentColor" aria-hidden>
                    <path d="M10 2a1 1 0 01.894.553l1.382 2.765 3.053.444a1 1 0 01.554 1.706l-2.21 2.154.522 3.04a1 1 0 01-1.451 1.054L10 12.347l-2.744 1.44a1 1 0 01-1.45-1.054l.52-3.04L4.118 7.54a1 1 0 01.554-1.706l3.053-.444L9.106 2.553A1 1 0 0110 2z" />
                  </svg>
                </div>
                <div>
                  <div className="font-semibold text-ink-100">AI overload coming soon</div>
                  <div className="text-sm text-ink-300">
                    Once you log a couple of sessions, add your Anthropic key in settings
                    and LiftSmart will generate your next workout from your history.
                  </div>
                </div>
              </div>
            </Card>
          </div>
        );
      }

      function cap(s) {
        if (!s) return '';
        return s[0].toUpperCase() + s.slice(1);
      }
      function goalTone(g) {
        if (g === 'bulking') return 'green';
        if (g === 'cutting') return 'amber';
        return 'cyan';
      }

      /* ------------------------------------------------------------------ */
      /* Settings                                                             */
      /* ------------------------------------------------------------------ */
      function SettingsScreen({ profile, onSaveProfile, apiKey, onSaveApiKey, onClearAll }) {
        const [editing, setEditing] = useState(false);
        const [pendingKey, setPendingKey] = useState(apiKey || '');
        const [keyVisible, setKeyVisible] = useState(false);

        return (
          <div className="mx-auto max-w-xl px-4 pb-24 pt-6">
            <SectionHeader title="Settings" subtitle="Tune your profile and keys" />

            <Card className="mb-5 p-4">
              <div className="mb-3 flex items-center justify-between">
                <div className="font-semibold text-ink-100">Profile</div>
                {!editing && (
                  <Button size="sm" variant="secondary" onClick={() => setEditing(true)}>
                    Edit
                  </Button>
                )}
              </div>
              {editing ? (
                <ProfileForm
                  initial={profile}
                  onSave={(p) => {
                    onSaveProfile(p);
                    setEditing(false);
                  }}
                  onCancel={() => setEditing(false)}
                  submitLabel="Save changes"
                />
              ) : (
                <ProfileSummary profile={profile} />
              )}
            </Card>

            <Card className="mb-5 p-4">
              <div className="mb-2 font-semibold text-ink-100">Anthropic API key</div>
              <p className="mb-3 text-sm text-ink-300">
                Used to generate your next-session recommendations. Stored only on this device.
              </p>
              <div className="flex gap-2">
                <div className="relative flex-1">
                  <input
                    type={keyVisible ? 'text' : 'password'}
                    value={pendingKey}
                    onChange={(e) => setPendingKey(e.target.value)}
                    placeholder="sk-ant-…"
                    className="w-full rounded-xl bg-ink-900 px-3.5 py-2.5 pr-10 font-mono text-sm text-ink-100 ring-1 ring-ink-700 placeholder-ink-400 focus:outline-none focus:ring-2 focus:ring-cyan-400/70"
                  />
                  <button
                    type="button"
                    onClick={() => setKeyVisible((x) => !x)}
                    className="absolute right-2 top-1/2 -translate-y-1/2 rounded px-2 py-1 text-xs text-ink-300 hover:bg-ink-700"
                  >
                    {keyVisible ? 'Hide' : 'Show'}
                  </button>
                </div>
                <Button onClick={() => onSaveApiKey(pendingKey.trim())}>Save</Button>
              </div>
              {apiKey && (
                <div className="mt-2 text-xs text-ink-400">
                  Key saved (…{apiKey.slice(-4)}). The AI recommender wires up in the next build.
                </div>
              )}
            </Card>

            <Card className="p-4">
              <div className="mb-2 font-semibold text-ink-100">Danger zone</div>
              <p className="mb-3 text-sm text-ink-300">
                Wipe your profile, workouts, and saved key from this device.
              </p>
              <Button
                variant="danger"
                onClick={() => {
                  if (confirm('Erase all LiftSmart data on this device?')) onClearAll();
                }}
              >
                Clear all local data
              </Button>
            </Card>
          </div>
        );
      }

      function ProfileSummary({ profile }) {
        const h =
          profile.heightUnit === 'cm'
            ? `${Math.round(profile.heightCm)} cm`
            : (() => {
                const { ft, in: inch } = cmToFtIn(profile.heightCm);
                return `${ft}' ${inch}"`;
              })();
        const rows = [
          ['Weight', `${profile.bodyWeight} ${profile.bodyWeightUnit}`],
          ['Height', h],
          ['Age', profile.age],
          ['Sex', cap(profile.sex)],
          ['Experience', cap(profile.experience)],
          ['Goal', cap(profile.goal)],
        ];
        return (
          <div className="divide-y divide-ink-700">
            {rows.map(([k, v]) => (
              <div key={k} className="flex items-center justify-between py-2">
                <div className="text-sm text-ink-300">{k}</div>
                <div className="text-sm font-medium text-ink-100">{v}</div>
              </div>
            ))}
          </div>
        );
      }

      /* ------------------------------------------------------------------ */
      /* Shell                                                                */
      /* ------------------------------------------------------------------ */
      function LogoMark({ className }) {
        return (
          <svg viewBox="0 0 24 24" className={className} fill="none" aria-hidden>
            <path
              d="M3 12h2M19 12h2M8 8h2v8H8zM14 8h2v8h-2z"
              stroke="currentColor"
              strokeWidth="2"
              strokeLinecap="round"
            />
            <path d="M10 12h4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
          </svg>
        );
      }

      function TabBar({ tab, onTab }) {
        const tabs = [
          { key: 'home', label: 'Home', icon: 'home' },
          { key: 'log', label: 'Log', icon: 'plus' },
          { key: 'history', label: 'History', icon: 'list' },
          { key: 'settings', label: 'Settings', icon: 'gear' },
        ];
        return (
          <nav className="fixed inset-x-0 bottom-0 z-20 border-t border-ink-700 bg-ink-900/90 pb-[env(safe-area-inset-bottom)] backdrop-blur">
            <div className="mx-auto flex max-w-xl items-stretch">
              {tabs.map((t) => {
                const active = tab === t.key;
                return (
                  <button
                    key={t.key}
                    onClick={() => onTab(t.key)}
                    className={cx(
                      'flex flex-1 flex-col items-center gap-1 py-2.5 text-xs transition',
                      active ? 'text-cyan-300' : 'text-ink-300 hover:text-ink-100',
                    )}
                  >
                    <TabIcon name={t.icon} active={active} />
                    <span className={cx('font-medium', active && 'text-cyan-200')}>{t.label}</span>
                  </button>
                );
              })}
            </div>
          </nav>
        );
      }

      function TabIcon({ name, active }) {
        const common = 'h-5 w-5';
        if (name === 'home')
          return (
            <svg viewBox="0 0 24 24" className={common} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden>
              <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-9.5z" />
            </svg>
          );
        if (name === 'plus')
          return (
            <svg viewBox="0 0 24 24" className={common} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" aria-hidden>
              <circle cx="12" cy="12" r="9" />
              <path d="M12 8v8M8 12h8" />
            </svg>
          );
        if (name === 'list')
          return (
            <svg viewBox="0 0 24 24" className={common} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" aria-hidden>
              <path d="M4 6h16M4 12h16M4 18h10" />
            </svg>
          );
        return (
          <svg viewBox="0 0 24 24" className={common} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden>
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z" />
          </svg>
        );
      }

      function App() {
        const [profile, setProfile] = useState(() => readLS(KEYS.profile, null));
        const [workouts, setWorkouts] = useState(() => readLS(KEYS.workouts, []));
        const [apiKey, setApiKey] = useState(() => readLS(KEYS.apiKey, ''));
        const [tab, setTab] = useState('home');
        const [loggingWorkout, setLoggingWorkout] = useState(false);

        useEffect(() => {
          if (profile) writeLS(KEYS.profile, profile);
        }, [profile]);
        useEffect(() => {
          writeLS(KEYS.workouts, workouts);
        }, [workouts]);
        useEffect(() => {
          writeLS(KEYS.apiKey, apiKey);
        }, [apiKey]);

        // If no profile, show setup
        if (!profile) {
          return (
            <ProfileSetupScreen
              onSaved={(p) => {
                setProfile(p);
                setTab('home');
              }}
            />
          );
        }

        const onSaveWorkout = (w) => {
          setWorkouts((cur) => [...cur, w]);
          setLoggingWorkout(false);
          setTab('history');
        };
        const onDeleteWorkout = (id) =>
          setWorkouts((cur) => cur.filter((w) => w.id !== id));

        const onClearAll = () => {
          setProfile(null);
          setWorkouts([]);
          setApiKey('');
          try {
            Object.values(KEYS).forEach((k) => localStorage.removeItem(k));
          } catch (e) {}
        };

        // Sub-screen: logging a workout preempts tab content
        if (loggingWorkout || tab === 'log') {
          return (
            <>
              <LogWorkoutScreen
                defaultUnit={profile.bodyWeightUnit}
                onSave={onSaveWorkout}
                onCancel={() => {
                  setLoggingWorkout(false);
                  setTab('home');
                }}
              />
              <TabBar
                tab={'log'}
                onTab={(t) => {
                  setLoggingWorkout(false);
                  setTab(t);
                }}
              />
            </>
          );
        }

        return (
          <>
            {tab === 'home' && (
              <HomeScreen
                profile={profile}
                workouts={workouts}
                onGoLog={() => setTab('log')}
                onGoHistory={() => setTab('history')}
                onGoSettings={() => setTab('settings')}
              />
            )}
            {tab === 'history' && (
              <HistoryScreen
                workouts={workouts}
                onDelete={onDeleteWorkout}
                onGoLog={() => setTab('log')}
              />
            )}
            {tab === 'settings' && (
              <SettingsScreen
                profile={profile}
                onSaveProfile={setProfile}
                apiKey={apiKey}
                onSaveApiKey={setApiKey}
                onClearAll={onClearAll}
              />
            )}
            <TabBar tab={tab} onTab={setTab} />
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
